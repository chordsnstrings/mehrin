# DigitalOcean App Platform spec for Mehrin (no database — purchases are stored
# in a JSON file on the server).
#
# ⚠️ IMPORTANT: App Platform's filesystem is EPHEMERAL. The purchases file is
# reset on every redeploy/restart here. For durable "note on the server"
# storage, deploy on a Droplet with a mounted Volume instead (see README) — it's
# also cheaper (~$4-6/mo) than App Platform + a managed database.
#
# Create with: doctl apps create --spec .do/app.yaml
name: mehrin
region: ams # pick a region where Binance is reachable (avoid US)
services:
  - name: web
    github:
      repo: chordsnstrings/mehrin
      branch: main
      deploy_on_push: true
    environment_slug: node-js
    build_command: npm run build
    run_command: npm start
    instance_size_slug: basic-xxs
    instance_count: 1
    http_port: 8080
    health_check:
      http_path: /api/health
    routes:
      - path: /
    envs:
      - key: NODE_ENV
        scope: RUN_AND_BUILD_TIME
        value: production
      - key: DATA_FILE
        scope: RUN_TIME
        value: /tmp/mehrin/purchases.json # ephemeral here; use a Droplet volume for durability
      - key: PRICE_SYMBOL
        scope: RUN_TIME
        value: BTCUSDT
